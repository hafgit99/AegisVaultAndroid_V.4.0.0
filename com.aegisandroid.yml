Builds:
  - versionName: 0.1.1
    versionCode: 11
    commit: v0.1.1
    subdir: android
    sudo:
      - apt-get remove -y npm || true
      - curl -fsSL https://deb.nodesource.com/setup_22.x | bash - || true
      - apt-get install -y nodejs
    gradle:
      - yes
    output: app/build/outputs/apk/release/app-release-unsigned.apk
    prebuild: |
      npm ci
      # Remove pre-built binaries from op-sqlite that F-Droid considers problematic
      rm -rf node_modules/@op-engineering/op-sqlite/android/src/main/libsqlitevec/ || true
      rm -rf node_modules/@op-engineering/op-sqlite/android/src/main/jniLibs/ || true
      rm -rf node_modules/@op-engineering/op-sqlite/android/src/main/libcrsqlite/ || true
      rm -rf node_modules/@op-engineering/op-sqlite/ios/ || true
      # Remove pre-built binaries from other packages
      rm -rf node_modules/hermes-compiler/hermesc/ || true
      rm -rf node_modules/fb-dotslash/ || true
      rm -rf node_modules/react-native/React/I18n/strings/ || true
      # Remove problematic gradle wrapper jars and compiled artifacts
      find node_modules -name gradle-wrapper.jar -delete 2>/dev/null || true
      find node_modules/@react-native -name "*.class" -delete 2>/dev/null || true
      find node_modules/@react-native -name "*.jar" -delete 2>/dev/null || true
      find node_modules/@react-native -path "*/build/*" -name "*.bin" -delete 2>/dev/null || true
    ndk: r27c

