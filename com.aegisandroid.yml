Builds:
  - versionName: 0.1.1
    versionCode: 11
    commit: v0.1.1
    subdir: android
    sudo:
      - apt-get remove -y npm || true
      - curl -fsSL https://deb.nodesource.com/setup_22.x | bash - || true
      - apt-get install -y nodejs
    gradle:
      - yes
    output: app/build/outputs/apk/release/app-release-unsigned.apk
    prebuild:
      - npm ci
      - rm -rf ../node_modules/@op-engineering/op-sqlite/android/src/main/libsqlitevec/
        || true
      - rm -rf ../node_modules/@op-engineering/op-sqlite/android/src/main/jniLibs/
        || true
      - rm -rf ../node_modules/@op-engineering/op-sqlite/android/src/main/libcrsqlite/
        || true
      - rm -rf ../node_modules/@op-engineering/op-sqlite/ios/ || true
      - rm -rf ../node_modules/hermes-compiler/hermesc/ || true
      - rm -rf ../node_modules/fb-dotslash/ || true
      - rm -rf ../node_modules/react-native/React/I18n/strings/ || true
      - find ../node_modules -name gradle-wrapper.jar -delete 2>/dev/null || true
      - find ../node_modules/@react-native -name "*.class" -delete 2>/dev/null ||
        true
      - find ../node_modules/@react-native -name "*.jar" -delete 2>/dev/null || true
      - find ../node_modules/@react-native -path "*/build/*" -name "*.bin" -delete
        2>/dev/null || true
      - rm -f ../hermes-win.tar.gz
      - rm -rf ../node_modules/@react-native/gradle-plugin/react-native-gradle-plugin/build/
      - rm -rf ../node_modules/@react-native/gradle-plugin/shared/build/
      - rm -rf ../node_modules/@react-native/gradle-plugin/settings-plugin/build/
      - find ../node_modules -name "hermes-win.tar.gz" -delete 2>/dev/null ||
        true
      - rm -rf ../node_modules/react-native-quick-crypto/deps/blake3/
    scanignore:
      - node_modules/react-native-safe-area-context/android/build.gradle
      - node_modules/react-native-biometrics/android/build.gradle
      - node_modules/react-native-svg/android/build.gradle
      - node_modules/react-native/ReactAndroid/publish.gradle
    scandelete:
      - hermes-win.tar.gz
    ndk: r27c

