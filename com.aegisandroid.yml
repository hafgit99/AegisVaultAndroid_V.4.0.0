    subdir: android/app
    sudo:
      - apt-get update
      - apt-get install -y npm
    gradle:
      - yes
    prebuild:
      - sed -i -e "/JavaVersion\|jvmTarget\|jvmToolchain/s/17/21/" build.gradle
      - cd ../..
      - npm ci --ignore-engines
      - sed -i '/jvmToolchain/s/17/21/' node_modules/@react-native/gradle-plugin/*/build.gradle.kts
      - sed -i -e 's/JavaVersion.VERSION_17/JavaVersion.VERSION_21/g' -e 's/jvmToolchain(17)/jvmToolchain(21)/g'
        node_modules/@react-native/gradle-plugin/react-native-gradle-plugin/src/main/kotlin/com/facebook/react/utils/JdkConfiguratorUtils.kt
    scanignore:
      - node_modules/react-native-safe-area-context/android/build.gradle
      - node_modules/react-native-biometrics/android/build.gradle
      - node_modules/react-native-svg/android/build.gradle
      - node_modules/hermes-compiler/hermesc/linux64-bin/hermesc
      - node_modules/react-native/ReactAndroid/publish.gradle
      - node_modules/react-native-camera-kit/android/build
    scandelete:
      - hermes-win.tar.gz
      - node_modules/hermes-compiler/hermesc/osx-bin
      - node_modules/fb-dotslash/bin
      - node_modules/react-native/React/I18n/strings
